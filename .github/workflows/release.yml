name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-server:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ">=1.3.0"

      - run: bun install --frozen-lockfile
      - run: bun install --frozen-lockfile
        working-directory: web

      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libssl-dev \
            libgtk-3-dev

      - name: Build server binaries
        run: bun run build --no-client

      - uses: actions/upload-artifact@v4
        with:
          name: server-binaries
          path: dist/bunny-*

  build-electron:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ">=1.3.0"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: bun install --frozen-lockfile
        working-directory: electron

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: bun -e "const fs=require('fs'); const p='electron/package.json'; const c=JSON.parse(fs.readFileSync(p,'utf8')); c.version=process.env.TAG.replace(/^v/,''); fs.writeFileSync(p,JSON.stringify(c,null,2)+'\n');"

      - name: Build Electron
        working-directory: electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: bun run build -- --publish never

      - name: Collect installers
        shell: bash
        working-directory: electron
        run: |
          mkdir -p ../dist-electron
          find dist -maxdepth 1 -type f \( \
            -name "BunnyClient-*.exe" -o \
            -name "BunnyClient-*.dmg" -o \
            -name "BunnyClient-*.zip" -o \
            -name "BunnyClient-*.AppImage" \
          \) -exec cp {} ../dist-electron/ \;
          ls -la ../dist-electron/ || true

      - uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.platform }}
          path: dist-electron/
          if-no-files-found: warn

  create-release:
    needs: [build-server, build-electron]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/**
          generate_release_notes: true
