name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-server:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ">=1.3.0"

      - run: bun install --frozen-lockfile
      - run: bun install --frozen-lockfile
        working-directory: web

      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libssl-dev \
            libgtk-3-dev

      - name: Build server binaries
        run: bun run build --no-client

      - uses: actions/upload-artifact@v4
        with:
          name: server-binaries
          path: dist/bunny-*

  build-tauri:
    strategy:
      matrix:
        include:
          - platform: ubuntu-22.04
            bundle-path: client/src-tauri/target/release/bundle
            tauri-args: ""
          - platform: macos-latest
            bundle-path: client/src-tauri/target/universal-apple-darwin/release/bundle
            tauri-args: "--target universal-apple-darwin"
          - platform: windows-latest
            bundle-path: client/src-tauri/target/release/bundle
            tauri-args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ">=1.3.0"

      - run: bun install --frozen-lockfile
      - run: bun install --frozen-lockfile
        working-directory: client

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TAG: ${{ github.ref_name }}
        run: bun -e "const fs=require('fs'); const p='client/src-tauri/tauri.conf.json'; const c=JSON.parse(fs.readFileSync(p,'utf8')); c.version=process.env.TAG.replace(/^v/,''); fs.writeFileSync(p,JSON.stringify(c,null,2)+'\n');"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri -> target

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Add macOS universal targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Build Tauri
        run: bun run tauri build ${{ matrix.tauri-args }}
        working-directory: client

      - uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.platform }}
          path: ${{ matrix.bundle-path }}

      - name: Create Windows portable zip
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: Compress-Archive -Path client/src-tauri/target/release/Bunny.exe -DestinationPath bunny-windows-x64-portable.zip

      - name: Upload Windows portable
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-windows-portable
          path: bunny-windows-x64-portable.zip

  create-release:
    needs: [build-server, build-tauri]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/**
          generate_release_notes: true
